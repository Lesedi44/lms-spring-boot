<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS · AI Leave Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            background-image:
                    radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 20%),
                    radial-gradient(circle at 80% 70%, rgba(255, 200, 0, 0.02) 0%, transparent 25%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1rem;
            color: #eaeaea;
        }

        /* Login Page Styles */
        .login-container {
            max-width: 400px;
            width: 100%;
            margin: auto;
        }

        .login-card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #fcd34d, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #888;
        }

        /* Dashboard Styles */
        .app-container {
            max-width: 1500px;
            width: 100%;
            display: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f0b90b;
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .header h1 {
            font-weight: 600;
            font-size: 2rem;
            background: linear-gradient(145deg, #fcd34d, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #1a1a1a;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #f3b30b40;
        }

        .user-info span {
            color: #ffd966;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #f3b30b;
            color: #ffd966;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #f3b30b;
            color: #0b0b0b;
        }

        /* Notification System */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .notification {
            background: rgba(20, 20, 20, 0.95);
            border-left: 4px solid #f3b30b;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 10px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }

        .notification.success {
            border-left-color: #10b981;
        }

        .notification.error {
            border-left-color: #ef4444;
        }

        .notification.info {
            border-left-color: #3b82f6;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 32px;
            padding: 1.8rem 1.6rem;
            transition: transform 0.15s ease, border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.6);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.6rem;
            border-bottom: 1px dashed #333;
            padding-bottom: 0.8rem;
        }

        .card-header h2 {
            color: #ffe484;
            font-size: 1.5rem;
        }

        input, select, textarea {
            width: 100%;
            background: #121212;
            border: 1px solid #2e2e2e;
            border-radius: 16px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: #f0f0f0;
            outline: none;
            margin-bottom: 1rem;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #f7b731;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15);
        }

        .button {
            background: transparent;
            border: 1.5px solid #f6b83e;
            color: #ffd966;
            padding: 0.9rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.18s;
            width: 100%;
        }

        .button:hover {
            background: #f6b83e;
            color: #0b0b0b;
            box-shadow: 0 0 20px #f8c150;
        }

        .button.small {
            padding: 0.5rem 1.2rem;
            width: auto;
        }

        /* Tables */
        .requests-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .requests-table th {
            text-align: left;
            padding: 0.8rem;
            color: #ffd966;
            border-bottom: 1px solid #333;
        }

        .requests-table td {
            padding: 0.8rem;
            border-bottom: 1px solid #222;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-pending { background: #fbbf2410; color: #fbbf24; border: 1px solid #fbbf2440; }
        .status-approved { background: #10b98110; color: #10b981; border: 1px solid #10b98140; }
        .status-rejected { background: #ef444410; color: #ef4444; border: 1px solid #ef444440; }

        .role-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #2a2a2a;
            color: #ffd966;
            margin-left: 0.5rem;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: #5a5a5a;
        }
    </style>
</head>
<body>
<!-- Notification Container -->
<div class="notification-container" id="notificationContainer"></div>

<!-- Login Page -->
<div class="login-container" id="loginPage">
    <div class="login-card">
        <div class="login-header">
            <h1>⚡ LMS</h1>
            <p>Leave Management System</p>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" value="john">
        </div>

        <div style="margin-bottom: 2rem;">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" value="employee123">
        </div>

        <button class="button" id="loginBtn">Login</button>

        <div style="margin-top: 2rem; text-align: center; color: #666; font-size: 0.9rem;">
            <p>Demo credentials:</p>
            <p>👤 john / employee123 (Employee)</p>
            <p>👔 mike / manager123 (Manager)</p>
            <p>⚙️ admin / admin123 (Admin)</p>
        </div>
    </div>
</div>

<!-- Dashboard (hidden initially) -->
<div class="app-container" id="dashboard">
    <div class="header">
        <h1>⚡ LMS Dashboard</h1>
        <div class="user-info">
            <span id="userNameDisplay"></span>
            <span class="role-badge" id="userRoleDisplay"></span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Dashboard content based on role will be populated by JavaScript -->
    <div id="dashboardContent"></div>

    <footer>
        ⚡ AI-Powered Leave Management System
    </footer>
</div>

<script>
    // Notification system
    function showNotification(message, type = 'info') {
        const container = document.getElementById('notificationContainer');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        container.appendChild(notification);

        setTimeout(() => {
            notification.remove();
        }, 3000);
    }

    // API calls with session
    async function apiCall(url, options = {}) {
        const response = await fetch(url, {
            ...options,
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json',
                ...options.headers
            }
        });

        const data = await response.json();

        if (!response.ok) {
            showNotification(data.message || 'An error occurred', 'error');
            throw new Error(data.message);
        }

        if (data.message) {
            showNotification(data.message, 'success');
        }

        return data;
    }

    // Check session on load
    async function checkSession() {
        try {
            const data = await apiCall('/api/auth/session', { method: 'GET' });
            if (data.authenticated) {
                showDashboard(data.user);
            }
        } catch (error) {
            // Not logged in, stay on login page
        }
    }

    // Login handler
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const data = await apiCall('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            if (data.success) {
                showDashboard(data.user);
            }
        } catch (error) {
            // Error already shown by apiCall
        }
    });

    // Logout handler
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
            await apiCall('/api/auth/logout', { method: 'POST' });
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        } catch (error) {
            // Error already shown
        }
    });

    // Show dashboard based on user role
    function showDashboard(user) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        document.getElementById('userNameDisplay').textContent = user.name;
        document.getElementById('userRoleDisplay').textContent = user.role;

        const dashboardContent = document.getElementById('dashboardContent');

        if (user.role === 'ADMIN') {
            dashboardContent.innerHTML = getAdminDashboard();
            initializeAdminFunctions();
        } else if (user.role === 'MANAGER') {
            dashboardContent.innerHTML = getManagerDashboard();
            initializeManagerFunctions();
        } else {
            dashboardContent.innerHTML = getEmployeeDashboard();
            initializeEmployeeFunctions();
        }
    }

    // Employee Dashboard
    function getEmployeeDashboard() {
        return `
                <div class="dashboard-grid">
                    <div class="card">
                        <div class="card-header">
                            <h2>📥 Submit Leave Request</h2>
                        </div>
                        <label>Start Date</label>
                        <input type="date" id="empStartDate">
                        <label>End Date</label>
                        <input type="date" id="empEndDate">
                        <label>Leave Type</label>
                        <select id="empLeaveType">
                            <option value="Annual">Annual Leave</option>
                            <option value="Sick">Sick Leave</option>
                            <option value="Family">Family Leave</option>
                        </select>
                        <label>Reason</label>
                        <textarea id="empReason" placeholder="Enter reason"></textarea>
                        <button class="button" id="submitLeaveBtn">Submit Request</button>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2>⚖️ My Leave Balance</h2>
                        </div>
                        <div id="employeeBalance">
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>📋 My Leave Requests</h2>
                    </div>
                    <table class="requests-table" id="myRequestsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Dates</th>
                                <th>Type</th>
                                <th>Days</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="myRequestsBody"></tbody>
                    </table>
                </div>
            `;
    }

    // Manager Dashboard
    function getManagerDashboard() {
        return `
                <div class="dashboard-grid">
                    <div class="card">
                        <div class="card-header">
                            <h2>✅ Pending Approvals</h2>
                        </div>
                        <div id="pendingRequests"></div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2>📊 Team Report</h2>
                        </div>
                        <button class="button small" id="generateReportBtn">Generate Report</button>
                        <div id="teamReport"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>👥 Team Leave Requests</h2>
                    </div>
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Dates</th>
                                <th>Type</th>
                                <th>Days</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="teamRequestsBody"></tbody>
                    </table>
                </div>
            `;
    }

    // Admin Dashboard
    function getAdminDashboard() {
        return `
                <div class="dashboard-grid">
                    <div class="card">
                        <div class="card-header">
                            <h2>📊 System Overview</h2>
                        </div>
                        <div id="systemStats"></div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2>👥 User Management</h2>
                        </div>
                        <button class="button small" id="listUsersBtn">List All Users</button>
                        <div id="userList"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>📋 All Leave Requests</h2>
                    </div>
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Employee</th>
                                <th>Dates</th>
                                <th>Type</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="allRequestsBody"></tbody>
                    </table>
                </div>
            `;
    }

    // Initialize functions based on role
    function initializeEmployeeFunctions() {
        loadMyLeaveBalance();
        loadMyLeaveRequests();

        document.getElementById('submitLeaveBtn').addEventListener('click', submitLeaveRequest);
    }

    function initializeManagerFunctions() {
        loadPendingRequests();
        loadTeamRequests();

        document.getElementById('generateReportBtn').addEventListener('click', generateTeamReport);
    }

    function initializeAdminFunctions() {
        loadSystemStats();
        loadAllUsers();
        loadAllRequests();
    }

    // Employee functions
    async function loadMyLeaveBalance() {
        try {
            const data = await apiCall('/api/leave/balance', { method: 'GET' });
            const balance = data.balance;
            document.getElementById('employeeBalance').innerHTML = `
                    <p>Annual Leave: ${balance.annualLeave} days</p>
                    <p>Sick Leave: ${balance.sickLeave} days</p>
                    <p>Family Leave: ${balance.familyLeave} days</p>
                `;
        } catch (error) {
            document.getElementById('employeeBalance').innerHTML = '<p>Error loading balance</p>';
        }
    }

    async function loadMyLeaveRequests() {
        try {
            const data = await apiCall('/api/leave', { method: 'GET' });
            const requests = data.requests;
            const tbody = document.getElementById('myRequestsBody');

            tbody.innerHTML = requests.map(req => `
                    <tr>
                        <td>#${req.id}</td>
                        <td>${req.startDate} to ${req.endDate}</td>
                        <td>${req.leaveType}</td>
                        <td>${req.workingDays}</td>
                        <td><span class="status-badge status-${req.status.toLowerCase()}">${req.status}</span></td>
                    </tr>
                `).join('');
        } catch (error) {
            // Error already shown
        }
    }

    async function submitLeaveRequest() {
        const startDate = document.getElementById('empStartDate').value;
        const endDate = document.getElementById('empEndDate').value;
        const leaveType = document.getElementById('empLeaveType').value;
        const reason = document.getElementById('empReason').value;

        // Validate form data
        if (!startDate || !endDate || !leaveType || !reason) {
            showNotification('Please fill all fields', 'error');
            return;
        }

        if (reason.length < 3) {
            showNotification('Reason must be at least 3 characters', 'error');
            return;
        }

        const request = {
            startDate: startDate,
            endDate: endDate,
            leaveType: leaveType,
            reason: reason
        };

        console.log('Submitting leave request:', request);

        try {
            const response = await fetch('http://localhost:3000/api/leave', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(request)
            });

            const data = await response.json();
            console.log('Response:', data);

            if (!response.ok) {
                showNotification(data.message || 'Error submitting request', 'error');
                return;
            }

            showNotification(data.message, 'success');

            // Clear form
            document.getElementById('empStartDate').value = '';
            document.getElementById('empEndDate').value = '';
            document.getElementById('empReason').value = '';

            // Reload requests
            loadMyLeaveRequests();
            loadMyLeaveBalance();

        } catch (error) {
            console.error('Error:', error);
            showNotification('Network error: ' + error.message, 'error');
        }
    }

    // Manager functions
    async function loadPendingRequests() {
        try {
            const data = await apiCall('/api/leave', { method: 'GET' });
            const pending = data.requests.filter(r => r.status === 'Pending');

            const container = document.getElementById('pendingRequests');
            if (pending.length === 0) {
                container.innerHTML = '<p>No pending requests</p>';
                return;
            }

            container.innerHTML = pending.map(req => `
                    <div style="margin-bottom: 1rem; padding: 1rem; background: #1a1a1a; border-radius: 16px;">
                        <p><strong>${req.employeeName}</strong> - ${req.leaveType}</p>
                        <p>${req.startDate} to ${req.endDate} (${req.workingDays} days)</p>
                        <p>Reason: ${req.reason}</p>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <button class="button small" onclick="approveRequest(${req.id})">Approve</button>
                            <button class="button small" onclick="rejectRequest(${req.id})">Reject</button>
                        </div>
                    </div>
                `).join('');
        } catch (error) {
            // Error already shown
        }
    }

    async function loadTeamRequests() {
        try {
            const data = await apiCall('/api/leave', { method: 'GET' });
            const tbody = document.getElementById('teamRequestsBody');

            tbody.innerHTML = data.requests.map(req => `
                    <tr>
                        <td>${req.employeeName}</td>
                        <td>${req.startDate} to ${req.endDate}</td>
                        <td>${req.leaveType}</td>
                        <td>${req.workingDays}</td>
                        <td><span class="status-badge status-${req.status.toLowerCase()}">${req.status}</span></td>
                        <td>
                            ${req.status === 'Pending' ? `
                                <button class="button small" onclick="approveRequest(${req.id})">✓</button>
                                <button class="button small" onclick="rejectRequest(${req.id})">✗</button>
                            ` : '-'}
                        </td>
                    </tr>
                `).join('');
        } catch (error) {
            // Error already shown
        }
    }

    async function generateTeamReport() {
        try {
            const data = await apiCall('/api/reports/leave', { method: 'GET' });
            const report = data.report;

            const container = document.getElementById('teamReport');
            container.innerHTML = report.map(emp => `
                    <div style="margin-bottom: 1rem; padding: 1rem; background: #1a1a1a; border-radius: 16px;">
                        <p><strong>${emp.employee}</strong> (${emp.department})</p>
                        <p>Approved: ${emp.totalApproved} requests (${emp.totalDaysTaken} days)</p>
                        <p>Pending: ${emp.pendingRequests}</p>
                        <p>Balance: Annual ${emp.balance.Annual}, Sick ${emp.balance.Sick}, Family ${emp.balance.Family}</p>
                    </div>
                `).join('');
        } catch (error) {
            // Error already shown
        }
    }

    // Global functions for approve/reject
    window.approveRequest = async function(requestId) {
        try {
            await apiCall(`/api/leave/${requestId}`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'Approved', comments: 'Approved by manager' })
            });

            // Reload views
            loadPendingRequests();
            loadTeamRequests();
        } catch (error) {
            // Error already shown
        }
    };

    window.rejectRequest = async function(requestId) {
        try {
            await apiCall(`/api/leave/${requestId}`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'Rejected', comments: 'Rejected by manager' })
            });

            // Reload views
            loadPendingRequests();
            loadTeamRequests();
        } catch (error) {
            // Error already shown
        }
    };

    // Admin functions
    async function loadSystemStats() {
        try {
            const data = await apiCall('/api/leave', { method: 'GET' });
            const requests = data.requests;

            const stats = {
                total: requests.length,
                pending: requests.filter(r => r.status === 'Pending').length,
                approved: requests.filter(r => r.status === 'Approved').length,
                rejected: requests.filter(r => r.status === 'Rejected').length
            };

            document.getElementById('systemStats').innerHTML = `
                    <p>Total Requests: ${stats.total}</p>
                    <p>Pending: ${stats.pending}</p>
                    <p>Approved: ${stats.approved}</p>
                    <p>Rejected: ${stats.rejected}</p>
                `;
        } catch (error) {
            // Error already shown
        }
    }

    async function loadAllUsers() {
        // This would need a new API endpoint for admin
        showNotification('User management coming soon', 'info');
    }

    async function loadAllRequests() {
        try {
            const data = await apiCall('/api/leave', { method: 'GET' });
            const tbody = document.getElementById('allRequestsBody');

            tbody.innerHTML = data.requests.map(req => `
                    <tr>
                        <td>#${req.id}</td>
                        <td>${req.employeeName}</td>
                        <td>${req.startDate} to ${req.endDate}</td>
                        <td>${req.leaveType}</td>
                        <td><span class="status-badge status-${req.status.toLowerCase()}">${req.status}</span></td>
                    </tr>
                `).join('');
        } catch (error) {
            // Error already shown
        }
    }

    // Check session on load
    checkSession();

    // Enter key for login
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('loginBtn').click();
        }
    });
</script>
</body>
</html>
